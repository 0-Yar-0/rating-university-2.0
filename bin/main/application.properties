spring.application.name=rating
# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
#PostgreSQL Configuration
spring.datasource.url=${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:${PGUSER:}}}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}}
spring.datasource.driver-class-name=org.postgresql.Driver
# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
# Session cookie
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
# allowed origins for frontend (comma-separated)
app.cors.allowed-origins=https://rating-university-web-v2-1.onrender.com,https://rating-university-web.onrender.com,http://localhost:5173

